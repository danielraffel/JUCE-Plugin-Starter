name: Build & Test

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated: macos,windows,linux or 'all')"
        required: false
        default: ""
        type: string
      mode:
        description: "Build mode (draft = publish with draft release)"
        type: choice
        options:
          - verify
          - sign
          - publish
          - draft
        default: verify
      sign_macos:
        description: "Sign macOS builds (sign/publish modes)"
        type: boolean
        default: true
      sign_windows:
        description: "Sign Windows builds (sign/publish modes)"
        type: boolean
        default: true
      create_release:
        description: "Create GitHub Release (publish mode)"
        type: boolean
        default: true
  push:
    branches: [main, "feature/**", "integrate/**"]
  pull_request:
  release:
    types: [created]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: build
  DISPLAY: :0
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true

defaults:
  run:
    shell: bash

jobs:
  # ── Determine which platforms to build ──────────────────────────────
  detect_platforms:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      mode: ${{ steps.set-mode.outputs.mode }}
      draft_release: ${{ steps.set-mode.outputs.draft_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine build mode
        id: set-mode
        run: |
          # Release events always use publish mode
          if [ "${{ github.event_name }}" = "release" ]; then
            MODE="publish"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE="verify"
          fi

          # "draft" mode is publish with a draft release — normalize for build/sign checks
          DRAFT_RELEASE="false"
          if [ "$MODE" = "draft" ]; then
            DRAFT_RELEASE="true"
            MODE="publish"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "draft_release=$DRAFT_RELEASE" >> $GITHUB_OUTPUT
          echo "Build mode: $MODE (draft: $DRAFT_RELEASE)"

      - name: Detect platforms
        id: set-matrix
        run: |
          # Priority: workflow_dispatch input > CI_PLATFORMS from .env > auto-detect

          # 1. Check workflow_dispatch input
          INPUT_PLATFORMS="${{ github.event.inputs.platforms }}"

          # 2. If no input, try CI_PLATFORMS from .env or .env.ci
          ENV_FILE=".env"
          [ ! -f "$ENV_FILE" ] && [ -f ".env.ci" ] && ENV_FILE=".env.ci"
          if [ -z "$INPUT_PLATFORMS" ] && [ -f "$ENV_FILE" ]; then
            INPUT_PLATFORMS=$(grep '^CI_PLATFORMS=' "$ENV_FILE" | sed 's/^CI_PLATFORMS=//' | sed 's/^["'\'']//' | sed 's/["'\'']*$//')
          fi

          # 3. If still empty or "all", auto-detect from project files
          if [ -z "$INPUT_PLATFORMS" ] || [ "$INPUT_PLATFORMS" = "all" ]; then
            PLATFORMS=""

            # macOS: always supported (JUCE-Plugin-Starter is macOS-first)
            PLATFORMS="macos"

            # Windows: detect build.ps1 or MSVC blocks in CMakeLists.txt
            if [ -f scripts/build.ps1 ] || grep -q 'if(MSVC\|if(WIN32' CMakeLists.txt 2>/dev/null; then
              PLATFORMS="$PLATFORMS,windows"
            fi

            # Linux: detect UNIX blocks in CMakeLists.txt or Linux steps in workflow
            if grep -q 'UNIX AND NOT APPLE' CMakeLists.txt 2>/dev/null; then
              PLATFORMS="$PLATFORMS,linux"
            fi

            INPUT_PLATFORMS="$PLATFORMS"
          fi

          # Build the matrix JSON
          MATRIX='{"include":['
          FIRST=true

          if echo "$INPUT_PLATFORMS" | grep -qi 'macos'; then
            [ "$FIRST" = true ] || MATRIX="$MATRIX,"
            MATRIX="$MATRIX"'{"name":"macOS","os":"macos-14","cmake-flags":"-G Ninja -DCMAKE_OSX_ARCHITECTURES=\"arm64;x86_64\""}'
            FIRST=false
          fi

          if echo "$INPUT_PLATFORMS" | grep -qi 'windows'; then
            [ "$FIRST" = true ] || MATRIX="$MATRIX,"
            MATRIX="$MATRIX"'{"name":"Windows","os":"windows-latest","cmake-flags":"-G Ninja"}'
            FIRST=false
          fi

          if echo "$INPUT_PLATFORMS" | grep -qi 'linux'; then
            [ "$FIRST" = true ] || MATRIX="$MATRIX,"
            MATRIX="$MATRIX"'{"name":"Linux","os":"ubuntu-22.04","cmake-flags":"-G Ninja"}'
            FIRST=false
          fi

          MATRIX="$MATRIX]}"

          echo "Detected platforms: $INPUT_PLATFORMS"
          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # ── Build, test, and optionally sign/publish ────────────────────────
  build_and_test:
    needs: detect_platforms
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_platforms.outputs.matrix) }}

    steps:
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      - name: Install JUCE Linux Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libxrandr-dev libxcursor-dev libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev libcurl4-openssl-dev pkg-config ninja-build xvfb
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Install IPP (Linux)
        if: runner.os == 'Linux' && env.ENABLE_IPP == 'true'
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update && sudo apt-get install -y intel-oneapi-ipp-devel

      - name: Install macOS Deps
        if: runner.os == 'macOS'
        run: brew install ninja osxutils

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install IPP (Windows)
        if: runner.os == 'Windows' && env.ENABLE_IPP == 'true'
        run: nuget install intelipp.static.win-x64 -Version 2022.3.0.387

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache build (sccache)
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Load .env
        run: |
          ENV_FILE=".env"
          [ ! -f "$ENV_FILE" ] && [ -f ".env.ci" ] && ENV_FILE=".env.ci"
          if [ -f "$ENV_FILE" ]; then
            while IFS='=' read -r key value; do
              [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
              value=$(echo "$value" | sed 's/^["'\'']//' | sed 's/["'\'']*$//')
              echo "${key}=${value}" >> $GITHUB_ENV
            done < "$ENV_FILE"
          fi

      # ── Signing status detection ──────────────────────────────────
      - name: Determine signing status
        id: signing
        run: |
          MODE="${{ needs.detect_platforms.outputs.mode }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT

          # macOS signing
          SIGN_MACOS="false"
          if [ "$MODE" != "verify" ] && \
             [ -n "${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}" ] && \
             [ "${{ github.event.inputs.sign_macos }}" != "false" ]; then
            SIGN_MACOS="true"
          fi
          echo "sign_macos=$SIGN_MACOS" >> $GITHUB_OUTPUT

          # Windows signing — supports PFX or Azure Trusted Signing
          SIGN_WINDOWS="false"
          if [ "$MODE" != "verify" ] && \
             [ "${{ github.event.inputs.sign_windows }}" != "false" ]; then
            if [ -n "${{ secrets.WINDOWS_CERT_PFX }}" ] || \
               [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
              SIGN_WINDOWS="true"
            fi
          fi
          echo "sign_windows=$SIGN_WINDOWS" >> $GITHUB_OUTPUT

          # Windows signing method
          WIN_METHOD="none"
          if [ "$SIGN_WINDOWS" = "true" ]; then
            if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
              WIN_METHOD="azure"
            else
              WIN_METHOD="pfx"
            fi
          fi
          echo "win_method=$WIN_METHOD" >> $GITHUB_OUTPUT

          echo "Mode: $MODE | Sign macOS: $SIGN_MACOS | Sign Windows: $SIGN_WINDOWS ($WIN_METHOD)"

      # ── macOS certificate import ──────────────────────────────────
      - name: Import Apple Certificates
        if: steps.signing.outputs.sign_macos == 'true' && runner.os == 'macOS'
        env:
          APP_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          INSTALLER_CERT_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APP_CERT_P12" | base64 --decode > $RUNNER_TEMP/app_cert.p12
          security import $RUNNER_TEMP/app_cert.p12 -P "$APP_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          if [ -n "$INSTALLER_CERT_P12" ]; then
            echo "$INSTALLER_CERT_P12" | base64 --decode > $RUNNER_TEMP/installer_cert.p12
            security import $RUNNER_TEMP/installer_cert.p12 -P "$INSTALLER_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm -f $RUNNER_TEMP/installer_cert.p12
          fi

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f $RUNNER_TEMP/app_cert.p12

      # ── Windows PFX certificate import ────────────────────────────
      - name: Import Windows Certificate (PFX)
        if: steps.signing.outputs.sign_windows == 'true' && steps.signing.outputs.win_method == 'pfx' && runner.os == 'Windows'
        shell: powershell
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
          $pfxPath = "$env:RUNNER_TEMP\certificate.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          Import-PfxCertificate -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force)

      # ── Build ─────────────────────────────────────────────────────
      - name: Configure
        run: |
          # Clear stale FetchContent subbuild caches (avoids generator mismatch)
          for dir in ~/.juce_cache/*-subbuild; do
            [ -d "$dir" ] && rm -rf "$dir/CMakeCache.txt" "$dir/CMakeFiles" 2>/dev/null || true
          done
          cmake -B ${{ env.BUILD_DIR }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel 4

      # ── Test ──────────────────────────────────────────────────────
      - name: Run Catch2 Tests
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --verbose --output-on-failure

      - name: Download PluginVal
        run: |
          curl -L "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_${{ runner.os }}.zip" -o pluginval.zip
          7z x pluginval.zip || unzip pluginval.zip || true

      - name: Validate VST3 (macOS)
        if: runner.os == 'macOS'
        run: |
          PLUGIN="$HOME/Library/Audio/Plug-Ins/VST3/${{ env.PROJECT_NAME }}.vst3"
          if [ -d "$PLUGIN" ]; then
            pluginval.app/Contents/MacOS/pluginval --validate-in-process --strictness-level 5 --verbose --skip-gui-tests --output-dir "./pluginval-logs" --validate "$PLUGIN"
          fi

      - name: Validate VST3 (Linux)
        if: runner.os == 'Linux'
        run: |
          PLUGIN="$HOME/.vst3/${{ env.PROJECT_NAME }}.vst3"
          if [ -d "$PLUGIN" ]; then
            ./pluginval --validate-in-process --strictness-level 5 --verbose --skip-gui-tests --output-dir "./pluginval-logs" --validate "$PLUGIN"
          fi

      - name: Validate VST3 (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 10
        continue-on-error: true
        shell: cmd
        run: |
          set PLUGIN=${{ env.BUILD_DIR }}\${{ env.PROJECT_NAME }}_artefacts\${{ env.BUILD_TYPE }}\VST3\${{ env.PROJECT_NAME }}.vst3
          if exist "%PLUGIN%" (
            pluginval.exe --validate-in-process --strictness-level 5 --verbose --skip-gui-tests --output-dir "./pluginval-logs" --validate "%PLUGIN%"
          )

      # ── macOS code signing ────────────────────────────────────────
      - name: Sign macOS Binaries
        if: steps.signing.outputs.sign_macos == 'true' && runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          echo "Signing macOS binaries..."
          # Sign each plugin format that exists
          for PLUGIN_PATH in \
            "$HOME/Library/Audio/Plug-Ins/Components/${{ env.PROJECT_NAME }}.component" \
            "$HOME/Library/Audio/Plug-Ins/VST3/${{ env.PROJECT_NAME }}.vst3" \
            "$HOME/Library/Audio/Plug-Ins/CLAP/${{ env.PROJECT_NAME }}.clap" \
            "${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}/Standalone/${{ env.PROJECT_NAME }}.app"; do
            if [ -e "$PLUGIN_PATH" ]; then
              codesign --force --deep --sign "${{ env.APP_CERT }}" \
                --options runtime --timestamp "$PLUGIN_PATH"
              echo "  Signed: $(basename "$PLUGIN_PATH")"
            fi
          done

      # ── macOS: Custom Finder icons for plugin bundles ────────────────
      - name: Add Custom Finder Icons (macOS)
        if: runner.os == 'macOS'
        run: |
          ICON_FILE="${{ github.workspace }}/Resources/Images/app_icon.png"
          if [ ! -f "$ICON_FILE" ]; then
            echo "  No app_icon.png found — skipping Finder icon injection"
            exit 0
          fi

          # Convert PNG to icns
          ICONSET_DIR="$RUNNER_TEMP/icon.iconset"
          mkdir -p "$ICONSET_DIR"
          sips -z 512 512 "$ICON_FILE" --out "$ICONSET_DIR/icon_256x256@2x.png" 2>/dev/null || true
          sips -z 256 256 "$ICON_FILE" --out "$ICONSET_DIR/icon_256x256.png" 2>/dev/null || true
          sips -z 128 128 "$ICON_FILE" --out "$ICONSET_DIR/icon_128x128.png" 2>/dev/null || true
          ICNS_FILE="$RUNNER_TEMP/plugin_icon.icns"
          iconutil -c icns "$ICONSET_DIR" -o "$ICNS_FILE" 2>/dev/null || true

          if [ ! -f "$ICNS_FILE" ]; then
            echo "  Could not generate .icns — skipping"
            exit 0
          fi

          # Inject icon resource into each plugin bundle
          sips -i "$ICNS_FILE" 2>/dev/null || true
          DeRez -only icns "$ICNS_FILE" > /tmp/plugin_icons 2>/dev/null || true

          for BUNDLE_PATH in \
            "$HOME/Library/Audio/Plug-Ins/Components/${{ env.PROJECT_NAME }}.component" \
            "$HOME/Library/Audio/Plug-Ins/VST3/${{ env.PROJECT_NAME }}.vst3" \
            "$HOME/Library/Audio/Plug-Ins/CLAP/${{ env.PROJECT_NAME }}.clap"; do
            if [ -d "$BUNDLE_PATH" ]; then
              Rez -a /tmp/plugin_icons -o "$BUNDLE_PATH/Icon"$'\r' 2>/dev/null || true
              SetFile -a C "$BUNDLE_PATH" 2>/dev/null || true
              echo "  Icon injected: $(basename "$BUNDLE_PATH")"
            fi
          done

      # ── macOS: Package into .pkg installer ──────────────────────────
      - name: Package & Notarize macOS Installer
        if: steps.signing.outputs.mode == 'publish' && runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          VERSION="${VERSION_MAJOR:-0}.${VERSION_MINOR:-0}.${VERSION_PATCH:-0}"
          PKG_DIR="$RUNNER_TEMP/pkg_staging"
          mkdir -p "$PKG_DIR"

          # Create component packages for each plugin format that exists
          PKG_ARGS=""

          AU_PATH="$HOME/Library/Audio/Plug-Ins/Components/${{ env.PROJECT_NAME }}.component"
          if [ -d "$AU_PATH" ]; then
            pkgbuild --component "$AU_PATH" \
              --install-location "/Library/Audio/Plug-Ins/Components" \
              --identifier "${{ env.PROJECT_BUNDLE_ID }}.au" \
              "$PKG_DIR/au.pkg"
            PKG_ARGS="$PKG_ARGS --package $PKG_DIR/au.pkg"
            echo "  Component: AU"
          fi

          VST3_PATH="$HOME/Library/Audio/Plug-Ins/VST3/${{ env.PROJECT_NAME }}.vst3"
          if [ -d "$VST3_PATH" ]; then
            pkgbuild --component "$VST3_PATH" \
              --install-location "/Library/Audio/Plug-Ins/VST3" \
              --identifier "${{ env.PROJECT_BUNDLE_ID }}.vst3" \
              "$PKG_DIR/vst3.pkg"
            PKG_ARGS="$PKG_ARGS --package $PKG_DIR/vst3.pkg"
            echo "  Component: VST3"
          fi

          CLAP_PATH="$HOME/Library/Audio/Plug-Ins/CLAP/${{ env.PROJECT_NAME }}.clap"
          if [ -d "$CLAP_PATH" ]; then
            pkgbuild --component "$CLAP_PATH" \
              --install-location "/Library/Audio/Plug-Ins/CLAP" \
              --identifier "${{ env.PROJECT_BUNDLE_ID }}.clap" \
              "$PKG_DIR/clap.pkg"
            PKG_ARGS="$PKG_ARGS --package $PKG_DIR/clap.pkg"
            echo "  Component: CLAP"
          fi

          APP_PATH="${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}/Standalone/${{ env.PROJECT_NAME }}.app"
          if [ -d "$APP_PATH" ]; then
            pkgbuild --component "$APP_PATH" \
              --install-location "/Applications" \
              --identifier "${{ env.PROJECT_BUNDLE_ID }}.standalone" \
              "$PKG_DIR/standalone.pkg"
            PKG_ARGS="$PKG_ARGS --package $PKG_DIR/standalone.pkg"
            echo "  Component: Standalone"
          fi

          if [ -z "$PKG_ARGS" ]; then
            echo "::warning::No plugin components found for packaging"
            exit 0
          fi

          # Create distribution XML and combined installer
          eval "productbuild --synthesize $PKG_ARGS $PKG_DIR/distribution.xml"
          eval "productbuild --distribution $PKG_DIR/distribution.xml \
            --package-path $PKG_DIR \
            $RUNNER_TEMP/unsigned.pkg"

          # Sign the installer package (if installer cert available)
          INSTALLER_PKG="${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_${VERSION}.pkg"
          SIGN_MACOS="${{ steps.signing.outputs.sign_macos }}"
          if [ "$SIGN_MACOS" = "true" ] && [ -n "${{ env.INSTALLER_CERT }}" ]; then
            productsign --sign "${{ env.INSTALLER_CERT }}" \
              "$RUNNER_TEMP/unsigned.pkg" "$INSTALLER_PKG"
            rm -f "$RUNNER_TEMP/unsigned.pkg"
            echo "  Signed installer with: ${{ env.INSTALLER_CERT }}"
          else
            mv "$RUNNER_TEMP/unsigned.pkg" "$INSTALLER_PKG"
          fi

          # Notarize the .pkg (if signing is enabled)
          if [ "$SIGN_MACOS" = "true" ] && [ -n "$APPLE_ID" ]; then
            echo "  Notarizing $(basename "$INSTALLER_PKG")..."
            xcrun notarytool submit "$INSTALLER_PKG" \
              --apple-id "$APPLE_ID" \
              --password "$APP_SPECIFIC_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait --timeout 15m

            xcrun stapler staple "$INSTALLER_PKG"
            echo "  Notarized and stapled"
          fi

          echo "INSTALLER_PKG=$INSTALLER_PKG" >> $GITHUB_ENV
          echo "  Created: $(basename "$INSTALLER_PKG") ($(du -h "$INSTALLER_PKG" | cut -f1))"

      # ── macOS: EdDSA signing for auto-updates ──────────────────────
      - name: Sign Installer with EdDSA
        if: steps.signing.outputs.mode == 'publish' && runner.os == 'macOS' && env.ENABLE_AUTO_UPDATE == 'true'
        env:
          EDDSA_PRIVATE_KEY: ${{ secrets.EDDSA_PRIVATE_KEY }}
        run: |
          if [ -z "$EDDSA_PRIVATE_KEY" ]; then
            echo "::warning::EDDSA_PRIVATE_KEY secret not configured — skipping EdDSA signing"
            exit 0
          fi

          # Download Sparkle's sign_update tool
          SPARKLE_VERSION="2.8.0"
          SPARKLE_URL="https://github.com/nicktrandafil/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          SPARKLE_DIR="$RUNNER_TEMP/sparkle"
          mkdir -p "$SPARKLE_DIR"

          # Try the official Sparkle release first, fall back to alternative
          curl -sL "https://github.com/nicktrandafil/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz" 2>/dev/null || \
          curl -sL "https://github.com/nicktrandafil/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.bz2" -o "$RUNNER_TEMP/sparkle.tar.bz2" 2>/dev/null

          if [ -f "$RUNNER_TEMP/sparkle.tar.xz" ]; then
            tar xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$SPARKLE_DIR"
          elif [ -f "$RUNNER_TEMP/sparkle.tar.bz2" ]; then
            tar xf "$RUNNER_TEMP/sparkle.tar.bz2" -C "$SPARKLE_DIR"
          fi

          # Find sign_update binary
          SIGN_TOOL=$(find "$SPARKLE_DIR" -name "sign_update" -type f 2>/dev/null | head -1)

          # Fallback: use the one from the repo if setup_sparkle.sh was run
          if [ -z "$SIGN_TOOL" ] || [ ! -x "$SIGN_TOOL" ]; then
            SIGN_TOOL="external/bin/sign_update"
          fi

          if [ ! -x "$SIGN_TOOL" ]; then
            echo "::warning::sign_update tool not found — skipping EdDSA signing"
            exit 0
          fi

          # sign_update reads EDDSA_PRIVATE_KEY env var as fallback to Keychain
          SIGN_OUTPUT=$("$SIGN_TOOL" "$INSTALLER_PKG" 2>&1)
          echo "sign_update output: $SIGN_OUTPUT"

          # Parse signature
          EDDSA_SIG=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          EDDSA_LEN=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [ -z "$EDDSA_LEN" ]; then
            EDDSA_LEN=$(stat -f%z "$INSTALLER_PKG" 2>/dev/null || stat -c%s "$INSTALLER_PKG" 2>/dev/null)
          fi

          if [ -n "$EDDSA_SIG" ]; then
            echo "EDDSA_SIGNATURE=$EDDSA_SIG" >> $GITHUB_ENV
            echo "EDDSA_LENGTH=$EDDSA_LEN" >> $GITHUB_ENV
            echo "  EdDSA signature: ${EDDSA_SIG:0:20}..."
            echo "  Length: $EDDSA_LEN bytes"
          else
            echo "::warning::Could not parse EdDSA signature from sign_update output"
          fi

      # ── Windows code signing (PFX) ────────────────────────────────
      - name: Sign Windows Binaries (PFX)
        if: steps.signing.outputs.sign_windows == 'true' && steps.signing.outputs.win_method == 'pfx' && runner.os == 'Windows'
        shell: powershell
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\certificate.pfx"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object -Descending | Select-Object -First 1

          $artifacts = "${{ env.BUILD_DIR }}\${{ env.PROJECT_NAME }}_artefacts\${{ env.BUILD_TYPE }}"

          # Sign VST3
          $vst3 = Get-ChildItem "$artifacts" -Recurse -Filter "*.vst3" | Where-Object { $_.Extension -eq ".vst3" -and !$_.PSIsContainer } | Select-Object -First 1
          if ($vst3) {
            & $signtool sign /f $pfxPath /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $vst3.FullName
            Write-Host "  Signed: $($vst3.Name)"
          }

          # Sign Standalone
          $exe = Get-ChildItem "$artifacts\Standalone" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            & $signtool sign /f $pfxPath /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName
            Write-Host "  Signed: $($exe.Name)"
          }

      # ── Windows code signing (Azure Trusted Signing) ──────────────
      - name: Sign Windows Binaries (Azure)
        if: steps.signing.outputs.sign_windows == 'true' && steps.signing.outputs.win_method == 'azure' && runner.os == 'Windows'
        uses: azure/trusted-signing-action@v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ env.BUILD_DIR }}\${{ env.PROJECT_NAME }}_artefacts\${{ env.BUILD_TYPE }}
          files-folder-filter: exe,dll,vst3
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Windows: Package installer (Inno Setup) ─────────────────────
      - name: Package Windows Installer
        if: steps.signing.outputs.mode == 'publish' && runner.os == 'Windows'
        shell: powershell
        run: |
          $version = "${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_PATCH }}"
          $artifacts = Join-Path (Get-Location) "${{ env.BUILD_DIR }}\${{ env.PROJECT_NAME }}_artefacts\${{ env.BUILD_TYPE }}"

          # Check if Inno Setup template exists
          if (Test-Path "templates\installer.iss") {
            # Use project-specific Inno Setup template
            $issContent = Get-Content "templates\installer.iss" -Raw
            $issContent = $issContent -replace '\{\{PROJECT_NAME\}\}', "${{ env.PROJECT_NAME }}"
            $issContent = $issContent -replace '\{\{VERSION\}\}', $version
            $issContent = $issContent -replace '\{\{ARTIFACTS\}\}', $artifacts
            $issContent = $issContent -replace '\{\{COMPANY_NAME\}\}', "${{ env.DEVELOPER_NAME }}"
            $issContent = $issContent -replace '\{\{PROJECT_BUNDLE_ID\}\}', "${{ env.PROJECT_BUNDLE_ID }}"
            $issFile = "$env:RUNNER_TEMP\installer.iss"
            $issContent | Out-File -FilePath $issFile -Encoding UTF8
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issFile
            # Find the generated Setup.exe (Inno outputs to Output/ relative to the .iss file)
            $setupExe = Get-ChildItem -Path "$env:RUNNER_TEMP\Output" -Filter "*_Setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($setupExe) {
              echo "INSTALLER_PKG=$($setupExe.FullName)" >> $env:GITHUB_ENV
              Write-Host "  Created: $($setupExe.Name)"
            }
          } else {
            # Simple zip fallback - create a zip of the build artifacts
            $outDir = "${{ env.BUILD_DIR }}"
            $zipName = "${{ env.PROJECT_NAME }}_${version}_Setup.zip"
            Compress-Archive -Path "$artifacts\Standalone\*","$artifacts\VST3\*" `
              -DestinationPath "$outDir\$zipName" -Force -ErrorAction SilentlyContinue
            echo "INSTALLER_PKG=$outDir\$zipName" >> $env:GITHUB_ENV
            Write-Host "  Created: $zipName (zip fallback - no Inno Setup template)"
          }

      # ── Linux: Package tar.gz archive ──────────────────────────────
      - name: Package Linux Archive
        if: steps.signing.outputs.mode == 'publish' && runner.os == 'Linux'
        run: |
          VERSION="${VERSION_MAJOR:-0}.${VERSION_MINOR:-0}.${VERSION_PATCH:-0}"
          ARTIFACTS="${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}"
          ARCHIVE="${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_${VERSION}.tar.gz"

          # Package VST3, CLAP, and Standalone into a tar.gz
          PACK_DIRS=""
          [ -d "$ARTIFACTS/VST3" ] && PACK_DIRS="$PACK_DIRS -C $ARTIFACTS VST3"
          [ -d "$ARTIFACTS/CLAP" ] && PACK_DIRS="$PACK_DIRS -C $ARTIFACTS CLAP"
          [ -d "$ARTIFACTS/Standalone" ] && PACK_DIRS="$PACK_DIRS -C $ARTIFACTS Standalone"

          if [ -n "$PACK_DIRS" ]; then
            eval "tar czf $ARCHIVE $PACK_DIRS"
            echo "INSTALLER_PKG=$ARCHIVE" >> $GITHUB_ENV
            echo "  Created: $(basename "$ARCHIVE") ($(du -h "$ARCHIVE" | cut -f1))"
          fi

      # ── Artifacts ─────────────────────────────────────────────────
      - name: Set artifact paths
        run: |
          ARTIFACTS=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PROJECT_NAME }}-${{ runner.os }}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACTS_PATH }}

      - name: Upload Installer Package
        if: steps.signing.outputs.mode == 'publish' && env.INSTALLER_PKG != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-installer-${{ runner.os }}
          path: ${{ env.INSTALLER_PKG }}

      - name: Save EdDSA Signature Metadata
        if: steps.signing.outputs.mode == 'publish' && env.EDDSA_SIGNATURE != ''
        run: |
          mkdir -p $RUNNER_TEMP/eddsa
          cat > $RUNNER_TEMP/eddsa/eddsa-${{ runner.os }}.json <<SIGEOF
          {
            "platform": "${{ runner.os }}",
            "signature": "${{ env.EDDSA_SIGNATURE }}",
            "length": "${{ env.EDDSA_LENGTH }}",
            "installer": "$(basename "${{ env.INSTALLER_PKG }}")"
          }
          SIGEOF

      - name: Upload EdDSA Metadata
        if: steps.signing.outputs.mode == 'publish' && env.EDDSA_SIGNATURE != ''
        uses: actions/upload-artifact@v4
        with:
          name: eddsa-${{ runner.os }}
          path: ${{ runner.temp }}/eddsa/

  # ── Create GitHub Release (publish mode only) ───────────────────────
  create_release:
    needs: [detect_platforms, build_and_test]
    if: >
      needs.detect_platforms.outputs.mode == 'publish' &&
      (github.event.inputs.create_release != 'false')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load .env
        run: |
          ENV_FILE=".env"
          [ ! -f "$ENV_FILE" ] && [ -f ".env.ci" ] && ENV_FILE=".env.ci"
          if [ -f "$ENV_FILE" ]; then
            while IFS='=' read -r key value; do
              [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
              value=$(echo "$value" | sed 's/^["'\'']//' | sed 's/["'\'']*$//')
              echo "${key}=${value}" >> $GITHUB_ENV
            done < "$ENV_FILE"
          fi

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-installer-*"
          path: installers

      - name: Download EdDSA metadata
        uses: actions/download-artifact@v4
        with:
          pattern: "eddsa-*"
          path: eddsa
        continue-on-error: true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPO_PAT: ${{ secrets.RELEASE_REPO_PAT }}
        run: |
          VERSION="${VERSION_MAJOR:-0}.${VERSION_MINOR:-0}.${VERSION_PATCH:-0}"
          TAG="v${VERSION}"

          echo "Creating release ${TAG}..."

          # Find all installer files (flatten nested dirs from download-artifact)
          RELEASE_DIR="$RUNNER_TEMP/release_files"
          mkdir -p "$RELEASE_DIR"
          find installers -type f \( -name "*.pkg" -o -name "*.exe" -o -name "*.tar.gz" -o -name "*.zip" \) \
            -exec cp {} "$RELEASE_DIR/" \;

          echo "Files for release:"
          ls -la "$RELEASE_DIR/" 2>/dev/null || echo "  (none found)"

          # Draft flag (draft mode creates a draft release for review)
          DRAFT_FLAG=""
          if [ "${{ needs.detect_platforms.outputs.draft_release }}" = "true" ]; then
            DRAFT_FLAG="--draft"
            echo "Creating DRAFT release (review before publishing)..."
          fi

          # Determine target repo for the release
          # RELEASE_REPO allows publishing to a different repo (split-repo pattern)
          TARGET_REPO="${RELEASE_REPO:-${{ github.repository }}}"
          REPO_FLAG=""
          if [ "$TARGET_REPO" != "${{ github.repository }}" ]; then
            REPO_FLAG="-R $TARGET_REPO"
            echo "Publishing to external repo: $TARGET_REPO"
            # Use PAT for cross-repo authentication
            if [ -n "$RELEASE_REPO_PAT" ]; then
              export GH_TOKEN="$RELEASE_REPO_PAT"
            fi
          fi

          # Create the release with installer files
          if ls "$RELEASE_DIR"/* &>/dev/null; then
            gh release create "$TAG" \
              --title "${{ env.PRODUCT_NAME }} ${VERSION}" \
              --generate-notes \
              $DRAFT_FLAG \
              $REPO_FLAG \
              "$RELEASE_DIR"/* 2>/dev/null || \
            gh release upload "$TAG" "$RELEASE_DIR"/* --clobber $REPO_FLAG 2>/dev/null || true
          else
            gh release create "$TAG" \
              --title "${{ env.PRODUCT_NAME }} ${VERSION}" \
              --generate-notes \
              $DRAFT_FLAG \
              $REPO_FLAG 2>/dev/null || true
          fi

          # Save release info for appcast generation
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_REPO=$TARGET_REPO" >> $GITHUB_ENV
          echo "Release ${TAG} created/updated on ${TARGET_REPO}"

          # Reset token to default for subsequent steps
          if [ "$TARGET_REPO" != "${{ github.repository }}" ]; then
            export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi

      # ── Generate Appcast XML for auto-updates ────────────────────────
      - name: Generate Appcast
        if: env.ENABLE_AUTO_UPDATE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPO_PAT: ${{ secrets.RELEASE_REPO_PAT }}
        run: |
          VERSION="${VERSION_MAJOR:-0}.${VERSION_MINOR:-0}.${VERSION_PATCH:-0}"
          TAG="${RELEASE_TAG:-v${VERSION}}"
          RELEASE_TARGET="${RELEASE_REPO:-${{ github.repository }}}"
          BUILD_NUMBER="${VERSION_BUILD:-${VERSION_MAJOR:-0}${VERSION_MINOR:-0}${VERSION_PATCH:-0}}"

          # Determine appcast target — same repo or separate appcast repo
          APPCAST_TARGET="${APPCAST_REPO:-${{ github.repository }}}"
          APPCAST_DIR="$RUNNER_TEMP/appcast_work"
          mkdir -p "$APPCAST_DIR"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Clone appcast repo (or use current repo)
          if [ "$APPCAST_TARGET" != "${{ github.repository }}" ]; then
            echo "Using separate appcast repo: $APPCAST_TARGET"
            if [ -n "$RELEASE_REPO_PAT" ]; then
              git clone "https://x-access-token:${RELEASE_REPO_PAT}@github.com/${APPCAST_TARGET}.git" "$APPCAST_DIR/repo"
            else
              git clone "https://github.com/${APPCAST_TARGET}.git" "$APPCAST_DIR/repo"
            fi
          else
            git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$APPCAST_DIR/repo"
          fi

          cd "$APPCAST_DIR/repo"
          PUB_DATE=$(date -R 2>/dev/null || date "+%a, %d %b %Y %H:%M:%S %z")

          # Load EdDSA metadata if available
          EDDSA_SIG=""
          EDDSA_LEN=""
          if [ -d "$GITHUB_WORKSPACE/eddsa" ]; then
            for f in "$GITHUB_WORKSPACE/eddsa"/eddsa-*/eddsa-*.json; do
              if [ -f "$f" ]; then
                EDDSA_SIG=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('signature',''))" 2>/dev/null || echo "")
                EDDSA_LEN=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('length',''))" 2>/dev/null || echo "")
                EDDSA_INSTALLER=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('installer',''))" 2>/dev/null || echo "")
                break
              fi
            done
          fi

          # ── macOS appcast ──────────────────────────────────────────
          PKG_NAME=$(find "$GITHUB_WORKSPACE/installers" -name "*.pkg" -type f 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$PKG_NAME" ]; then
            DOWNLOAD_URL="https://github.com/${RELEASE_TARGET}/releases/download/${TAG}/${PKG_NAME}"
            EDDSA_ATTR=""
            if [ -n "$EDDSA_SIG" ]; then
              EDDSA_ATTR="sparkle:edSignature=\"${EDDSA_SIG}\""
            fi
            if [ -z "$EDDSA_LEN" ] && [ -n "$PKG_NAME" ]; then
              PKG_PATH=$(find "$GITHUB_WORKSPACE/installers" -name "*.pkg" -type f 2>/dev/null | head -1)
              EDDSA_LEN=$(stat -c%s "$PKG_PATH" 2>/dev/null || echo "0")
            fi

            cat > appcast-macos.xml <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>${PROJECT_NAME} macOS Updates</title>
              <link>${AUTO_UPDATE_FEED_URL:-https://raw.githubusercontent.com/${APPCAST_TARGET}/main/appcast-macos.xml}</link>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  ${EDDSA_ATTR}
                  length="${EDDSA_LEN}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF
            echo "  Generated appcast-macos.xml (EdDSA: $([ -n "$EDDSA_SIG" ] && echo 'yes' || echo 'no'))"
          fi

          # ── Windows appcast ────────────────────────────────────────
          WIN_INSTALLER=$(find "$GITHUB_WORKSPACE/installers" -name "*Setup*.exe" -o -name "*Setup*.zip" 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$WIN_INSTALLER" ]; then
            WIN_TAG="${TAG}"
            # Some projects use separate Windows release tags (e.g., v1.0.0-win)
            if [ -n "$RELEASE_REPO" ] && [ "$RELEASE_REPO" != "${{ github.repository }}" ]; then
              WIN_TAG="${TAG}-win"
            fi
            WIN_URL="https://github.com/${RELEASE_TARGET}/releases/download/${WIN_TAG}/${WIN_INSTALLER}"
            WIN_SIZE=$(stat -c%s "$(find "$GITHUB_WORKSPACE/installers" -name "*Setup*" 2>/dev/null | head -1)" 2>/dev/null || echo "0")

            cat > appcast-windows.xml <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>${PROJECT_NAME} Windows Updates</title>
              <link>${AUTO_UPDATE_FEED_URL_WINDOWS:-https://raw.githubusercontent.com/${APPCAST_TARGET}/main/appcast-windows.xml}</link>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${WIN_URL}"
                  sparkle:version="${BUILD_NUMBER}"
                  sparkle:shortVersionString="${VERSION}"
                  length="${WIN_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF
            echo "  Generated appcast-windows.xml"
          fi

          # ── Commit and push appcast changes ────────────────────────
          git add appcast-*.xml 2>/dev/null || true
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "Update appcast for v${VERSION}"
            git push origin HEAD
            echo "  Appcast pushed to ${APPCAST_TARGET}"
          else
            echo "  Appcast unchanged, skipping push"
          fi

          cd "$GITHUB_WORKSPACE"

      # ── Update latest.json (split-repo pattern) ──────────────────────
      - name: Update latest.json
        if: env.ENABLE_AUTO_UPDATE == 'true' && env.RELEASE_REPO != '' && env.RELEASE_REPO != github.repository
        env:
          RELEASE_REPO_PAT: ${{ secrets.RELEASE_REPO_PAT }}
        run: |
          VERSION="${VERSION_MAJOR:-0}.${VERSION_MINOR:-0}.${VERSION_PATCH:-0}"
          TAG="${RELEASE_TAG:-v${VERSION}}"
          RELEASE_TARGET="${RELEASE_REPO}"

          LATEST_DIR="$RUNNER_TEMP/latest_work"
          mkdir -p "$LATEST_DIR"

          if [ -n "$RELEASE_REPO_PAT" ]; then
            git clone "https://x-access-token:${RELEASE_REPO_PAT}@github.com/${RELEASE_TARGET}.git" "$LATEST_DIR/repo"
          else
            git clone "https://github.com/${RELEASE_TARGET}.git" "$LATEST_DIR/repo"
          fi

          cd "$LATEST_DIR/repo"

          # Read existing latest.json or start fresh
          EXISTING="{}"
          [ -f latest.json ] && EXISTING=$(cat latest.json)

          # Find installer filenames from artifacts
          PKG_NAME=$(find "$GITHUB_WORKSPACE/installers" -name "*.pkg" -type f 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WIN_NAME=$(find "$GITHUB_WORKSPACE/installers" -name "*Setup*" -type f 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          TAR_NAME=$(find "$GITHUB_WORKSPACE/installers" -name "*.tar.gz" -type f 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          # Build latest.json using python
          python3 -c "
          import json, sys
          data = json.loads('''${EXISTING}''')
          v = '${VERSION}'
          repo = '${RELEASE_TARGET}'
          tag = '${TAG}'
          if '${PKG_NAME}':
              data['macos'] = {'version': v, 'url': f'https://github.com/{repo}/releases/download/{tag}/${PKG_NAME}'}
          if '${WIN_NAME}':
              data['windows'] = {'version': v, 'url': f'https://github.com/{repo}/releases/download/{tag}-win/${WIN_NAME}'}
          if '${TAR_NAME}':
              data['linux'] = {'version': v, 'url': f'https://github.com/{repo}/releases/download/{tag}/${TAR_NAME}'}
          print(json.dumps(data, indent=2))
          " > latest.json

          git add latest.json
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "Update latest.json for v${VERSION}"
            git push origin HEAD
            echo "  latest.json pushed to ${RELEASE_TARGET}"
          fi

          cd "$GITHUB_WORKSPACE"

      # ── Update website download links ─────────────────────────────
      - name: Update Website Download Links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f scripts/update_download_links.sh ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            chmod +x scripts/update_download_links.sh
            ./scripts/update_download_links.sh
          fi

      # ── Cleanup keychain (macOS) ──────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/signing.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/certificate.pfx" 2>/dev/null || true
